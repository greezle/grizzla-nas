server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /gcode/ {
        alias /srv/gcode/;
        autoindex on;
        # Pace each download at the source: a printer physically consumes
        # <= ~0.78 MB/s (USB Full-Speed), but unpaced gigabit bursts from
        # here overflow the small buffers of the daisy-chained farm switches
        # when several printers sync at once - the printers' 24 KB TCP
        # windows then spiral into retransmission backoff and starve (field
        # incidents: sections M/N 2026-07-11, section L 2026-07-12; one
        # printer hogged the segment, the rest stalled mid-file). Pacing
        # keeps shared queues empty; a single printer loses nothing.
        limit_rate 800k;
        auth_basic "gcode-nas";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # SSE stream: no buffering, generous read timeout (25 s server pings)
    location = /awaria/api/stream {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 1h;
        auth_basic "gcode-nas";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    location /awaria/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header X-Forwarded-For $remote_addr;
        auth_basic "gcode-nas";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    location = /awaria {
        return 301 /awaria/;
    }
}
