server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /gcode/ {
        alias /srv/gcode/;
        autoindex on;
        auth_basic "gcode-nas";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # SSE stream: no buffering, generous read timeout (25 s server pings)
    location = /awaria/api/stream {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 1h;
        auth_basic "gcode-nas";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    location /awaria/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header X-Forwarded-For $remote_addr;
        auth_basic "gcode-nas";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    location = /awaria {
        return 301 /awaria/;
    }
}
